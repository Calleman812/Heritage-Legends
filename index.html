<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Heritage — Halls of Legend</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cinzel+Decorative:wght@400;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0a06;font-family:'Cinzel',serif;color:#e8d5a3;min-height:100vh;padding-bottom:60px}
.hall-bg{position:fixed;inset:0;background:radial-gradient(ellipse 80% 40% at 50% 0%,#1a0e02 0%,transparent 70%),radial-gradient(ellipse 60% 30% at 20% 50%,#0a0a1a 0%,transparent 60%),radial-gradient(ellipse 60% 30% at 80% 50%,#0a1a0a 0%,transparent 60%),#0d0a06;pointer-events:none;z-index:0}
.wrap{position:relative;z-index:1}
.hall-header{text-align:center;padding:48px 20px 32px;border-bottom:1px solid #3a2a10}
.hall-header::before,.hall-header::after{content:'';display:block;width:120px;height:2px;background:linear-gradient(90deg,transparent,#c8a84b,transparent);margin:0 auto}
.hall-header::before{margin-bottom:20px}
.hall-header::after{margin-top:20px}
.hall-title{font-family:'Cinzel Decorative',serif;font-size:32px;font-weight:700;color:#f0d060;text-shadow:0 0 40px rgba(200,168,75,0.4);letter-spacing:2px;margin-bottom:6px}
.hall-subtitle{font-size:13px;color:#8a7040;letter-spacing:4px}
.hall-stats{display:grid;grid-template-columns:1.2fr 1px 1fr 1px 1fr 1px 1fr;background:#0f0d08;margin:20px 24px 0;border:1px solid #2a1e08;border-radius:2px;overflow:hidden}
.stat-div{background:#2a1e08}
.stat-cell{background:#0f0d08;padding:14px 10px;text-align:center;cursor:pointer;transition:background .2s;position:relative}
.stat-cell:hover{background:#181208}
.stat-cell.active{background:#1a1408}
.stat-cell.active::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px}
.stat-cell-all.active::after{background:linear-gradient(90deg,transparent,#c8a84b,transparent)}
.stat-cell-atiesh.active::after{background:linear-gradient(90deg,transparent,#b060f0,transparent)}
.stat-cell-thunder.active::after{background:linear-gradient(90deg,transparent,#c87820,transparent)}
.stat-cell-sulfuras.active::after{background:linear-gradient(90deg,transparent,#e05020,transparent)}
.stat-num{font-family:'Cinzel Decorative',serif;font-size:20px;font-weight:700;margin-bottom:3px;display:block}
.stat-cell-all .stat-num{color:#f0d060}
.stat-cell-atiesh .stat-num{color:#b060f0}
.stat-cell-thunder .stat-num{color:#c87820}
.stat-cell-sulfuras .stat-num{color:#e05020}
.stat-label{font-size:8px;letter-spacing:2px;color:#5a4020;text-transform:uppercase;line-height:1.3;display:block}
.legend-count{text-align:center;font-size:11px;color:#5a4020;letter-spacing:3px;padding:14px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:16px;padding:0 24px}
.card{background:linear-gradient(160deg,#1a1208 0%,#0f0d08 100%);border-radius:2px;padding:20px 16px 16px;text-align:center;transition:transform .25s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-2px)}
.card-num{position:absolute;top:8px;left:10px;font-size:9px;color:#3a2a10;letter-spacing:1px}
.card-top-bar{position:absolute;top:0;left:0;right:0;height:2px}
.card-date{font-size:9px;color:#5a4020;letter-spacing:2px;margin-bottom:8px;text-transform:uppercase}
.icon-wrap{width:48px;height:48px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;overflow:hidden}
.icon-wrap img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.card-name{font-family:'Cinzel',serif;font-size:14px;font-weight:600;margin-bottom:4px;line-height:1.2}
.card-class{font-size:10px;letter-spacing:2px;margin-bottom:10px;text-transform:uppercase}
.card-divider{width:40px;height:1px;margin:0 auto 10px;opacity:0.3}
.card-item{font-size:9px;letter-spacing:1.5px;text-transform:uppercase;line-height:1.4;color:#c87820}
</style>
</head>
<body>
<div class="hall-bg"></div>
<div class="wrap">
  <div class="hall-header">
    <div class="hall-title">Heritage</div>
    <div class="hall-subtitle">Halls of Legend</div>
  </div>
  <div class="hall-stats">
    <div class="stat-cell stat-cell-all active" onclick="filterBy('all')"><span class="stat-num" id="s-all">34</span><span class="stat-label">Total Legendaries</span></div>
    <div class="stat-div"></div>
    <div class="stat-cell stat-cell-atiesh" onclick="filterBy('atiesh')"><span class="stat-num" id="s-atiesh">0</span><span class="stat-label">Atiesh Forged</span></div>
    <div class="stat-div"></div>
    <div class="stat-cell stat-cell-thunder" onclick="filterBy('thunderfury')"><span class="stat-num" id="s-thunder">0</span><span class="stat-label">Thunderfury Bound</span></div>
    <div class="stat-div"></div>
    <div class="stat-cell stat-cell-sulfuras" onclick="filterBy('sulfuras')"><span class="stat-num" id="s-sulfuras">0</span><span class="stat-label">Sulfuras Reborn</span></div>
  </div>
  <div class="legend-count" id="count"></div>
  <div class="grid" id="grid"></div>
</div>

const DATA=[["Jun-26","Dissa","Priest","atiesh"],["Mar-26","Gnomenjoyer","Mage","atiesh"],["Mar-26","Bensalts","Paladin","sulfuras"],["Jan-26","Nandor","Priest","atiesh"],["Oct-25","Kastor","Mage","atiesh"],["Oct-25","Awesomex","Paladin","sulfuras"],["Sep-25","Astaria","Druid","atiesh"],["Jul-25","Pregitte","Priest","atiesh"],["Jul-25","Safaa","Priest","atiesh"],["Jun-25","Mallykith","Mage","atiesh"],["May-25","Calleman","Priest","atiesh"],["Apr-25","Intecharged","Warrior","thunderfury"],["Apr-25","Grumble","Priest","atiesh"],["Feb-25","Yennefer","Druid","atiesh"],["Jan-25","Naihanchi","Druid","atiesh"],["Dec-24","Nymeria","Priest","atiesh"],["Nov-24","Zalro","Warrior","thunderfury"],["Oct-24","Babyjeane","Warlock","atiesh"],["Aug-24","Kuriel","Priest","atiesh"],["Jul-24","Lightguard","Paladin","sulfuras"],["Jun-24","Sitara","Mage","atiesh"],["Apr-24","Lunma","Priest","atiesh"],["Feb-24","Siniel","Warlock","atiesh"],["Jan-24","Wincey","Mage","atiesh"],["Nov-23","Qwadi","Warrior","thunderfury"],["Oct-23","Yossarin","Priest","atiesh"],["Sep-23","Trebh","Priest","atiesh"],["Sep-23","Methoneiros","Druid","atiesh"],["Jul-23","Guru","Mage","atiesh"],["Jul-23","Zabber","Warrior","thunderfury"],["May-23","Bustler","Warlock","atiesh"],["May-23","Amatheia","Warrior","sulfuras"],["May-23","Liverall","Priest","atiesh"],["Feb-23","Legss","Mage","atiesh"]];
const ITEMS={atiesh:"Atiesh, Greatstaff of the Guardian",thunderfury:"Thunderfury, Blessed Blade of the Windseeker",sulfuras:"Sulfuras, Hand of Ragnaros"};
const CC={Priest:{c:"#cccccc"},Paladin:{c:"#f58cba"},Druid:{c:"#ff7d0a"},Mage:{c:"#69ccf0"},Warlock:{c:"#9482c9"},Warrior:{c:"#c79c6e"},Rogue:{c:"#fff569"}};
document.getElementById('s-all').textContent=DATA.length;
document.getElementById('s-atiesh').textContent=DATA.filter(d=>d[3]==='atiesh').length;
document.getElementById('s-thunder').textContent=DATA.filter(d=>d[3]==='thunderfury').length;
document.getElementById('s-sulfuras').textContent=DATA.filter(d=>d[3]==='sulfuras').length;
let cur='all';
function filterBy(t){
  cur=t;
  document.querySelectorAll('.stat-cell').forEach(e=>e.classList.remove('active'));
  const m={all:'stat-cell-all',atiesh:'stat-cell-atiesh',thunderfury:'stat-cell-thunder',sulfuras:'stat-cell-sulfuras'};
  document.querySelector('.'+m[t]).classList.add('active');
  render();
}
function render(){
  const f=cur==='all'?DATA:DATA.filter(d=>d[3]===cur);
  document.getElementById('count').textContent=(cur==='all'?'All ':'')+f.length+' legend'+(f.length!==1?'s':'')+' inscribed';
  document.getElementById('grid').innerHTML=f.map(d=>{
    const[date,name,cls,item]=d;
    const rank=DATA.indexOf(d)+1;
    const col=(CC[cls]||CC.Warrior).c;
    return '<div class="card" style="border:1px solid '+col+'28"><div class="card-top-bar" style="background:linear-gradient(90deg,transparent,'+col+',transparent)"></div><div class="card-num">#'+String(rank).padStart(2,'0')+'</div><div class="card-date">'+date+'</div><div class="icon-wrap" style="background:'+col+'18;border:1px solid '+col+'44"><img src="'+ICONS[cls]+'" alt="'+cls+'"/></div><div class="card-name" style="color:'+col+'">'+name+'</div><div class="card-class" style="color:'+col+'88">'+cls+'</div><div class="card-divider" style="background:'+col+'"></div><div class="card-item">'+ITEMS[item]+'</div></div>';
  }).join('');
}
render();
</script>
